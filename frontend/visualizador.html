<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++Disk 2.0 — Explorador con Journaling</title>
    <link rel="stylesheet" href="visor.css">
    <style>
        .id-badge { font-family: monospace; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; }
        .id-ok { background: #2ecc7122; color: #2ecc71; border: 1px solid #2ecc71; }
        .id-none { background: #e74c3c22; color: #e74c3c; border: 1px solid #e74c3c; }
        
        /* Estilos para la tabla de Journaling */
        .journal-table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #e0e0e0; }
        .journal-table th { text-align: left; padding: 12px; border-bottom: 2px solid #333; color: #888; text-transform: uppercase; font-size: 0.75rem; }
        .journal-table td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .op-badge { background: #6272a4; color: white; padding: 2px 6px; border-radius: 3px; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body class="visor-body">

<div class="toolbar">
    <div class="toolbar-brand"><span class="brand-icon">⬡</span> C++Disk <span class="brand-sub">2.0</span></div>
    <div class="toolbar-center">
        <div class="visor-breadcrumb" id="breadcrumb">
            <span class="bc-item bc-home" onclick="irHome()">⬡ Inicio</span>
        </div>
    </div>
    <div class="toolbar-actions">
        <div class="session-badge-toolbar">
            <span class="session-dot"></span>
            <span id="sessionUser">Root</span>
            <span class="session-sep">·</span>
            <span id="sessionParticion">—</span>
        </div>
        <button class="btn-teal" onclick="window.location.href='index.html'">⌨ Consola</button>
    </div>
</div>

<div class="visor-layout">
    <div class="visor-sidebar">
        <div class="sidebar-section">
            <div class="sidebar-label">Navegación</div>
            <div class="sidebar-nav">
                <button class="sidebar-btn active" id="sideDiscos" onclick="mostrarVista('discos')">
                    <img src="imagenes/Disco.svg" class="sidebar-icon"> Discos
                </button>
                <button class="sidebar-btn" id="sideParticiones" onclick="mostrarVista('particiones')" disabled>
                    <img src="imagenes/Particion.svg" class="sidebar-icon"> Particiones
                </button>
                <button class="sidebar-btn" id="sideArchivos" onclick="mostrarVista('archivos')" disabled>
                    <img src="imagenes/Carpeta.svg" class="sidebar-icon"> Archivos
                </button>
                <button class="sidebar-btn" id="sideJournaling" onclick="cargarJournaling()" disabled>
                    <img src="imagenes/Reporte.svg" class="sidebar-icon"> Journaling
                </button>
            </div>
        </div>
    </div>

    <div class="visor-main">
        <div id="vistaDiscos" class="visor-view active">
            <div class="visor-view-header">
                <div><div class="vv-title">Unidades Físicas</div><div class="vv-sub">/home/angel/Pruebas_MIA/</div></div>
                <button class="btn-refresh" onclick="cargarDiscos()">↻</button>
            </div>
            <div class="visor-grid" id="gridDiscos"></div>
        </div>

        <div id="vistaParticiones" class="visor-view">
            <div class="visor-view-header">
                <div><div class="vv-title" id="nombreDisco">Particiones</div><div class="vv-sub">Selecciona una para operar</div></div>
                <button class="btn-ghost btn-sm" onclick="mostrarVista('discos')">Volver</button>
            </div>
            <div class="visor-grid" id="gridParticiones"></div>
        </div>

        <div id="vistaArchivos" class="visor-view">
            <div class="visor-view-header">
                <div><div class="vv-title">Archivos</div><div class="vv-sub" id="pathLabel">/</div></div>
                <button class="btn-ghost btn-sm" onclick="subirNivel()">↑ Subir</button>
            </div>
            <div class="visor-files" id="listaArchivos"></div>
        </div>

        <div id="vistaJournaling" class="visor-view">
            <div class="visor-view-header">
                <div><div class="vv-title">Registro de Journaling</div><div class="vv-sub" id="journalSub">Historial de transacciones EXT3</div></div>
                <button class="btn-refresh" onclick="cargarJournaling()">↻ Actualizar</button>
            </div>
            <div style="padding: 20px; overflow-y: auto;">
                <table class="journal-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Operación</th>
                            <th>Path / Destino</th>
                            <th>Contenido / Info</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="journalBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="common.js"></script>
<script>
const API = "http://localhost:8080";
let estado = { discoRuta: "", particionId: "", pathFS: "/", rutaBase: "/home/angel/Pruebas_MIA/" };

window.onload = cargarDiscos;

async function cargarDiscos() {
    const grid = document.getElementById("gridDiscos");
    grid.innerHTML = '<div class="spinner"></div>';
    try {
        const res = await fetch(`${API}/discos?path=${encodeURIComponent(estado.rutaBase)}`);
        const data = await res.json();
        grid.innerHTML = "";
        data.forEach(d => {
            if (d.esDirectorio) return;
            const card = document.createElement("div");
            card.className = "visor-card disco-card";
            card.innerHTML = `<div class="card-icon-wrap"><img src="imagenes/Disco.svg" class="card-icon"></div><div class="card-name">${d.nombre}</div>`;
            card.onclick = () => seleccionarDisco(d.ruta, d.nombre);
            grid.appendChild(card);
        });
    } catch (e) { grid.innerHTML = "Error Backend"; }
}

async function seleccionarDisco(ruta, nombre) {
    estado.discoRuta = ruta;
    document.getElementById("nombreDisco").textContent = nombre;
    document.getElementById("sideParticiones").disabled = false;
    mostrarVista("particiones");
    const grid = document.getElementById("gridParticiones");
    grid.innerHTML = '<div class="spinner"></div>';
    try {
        const res = await fetch(`${API}/particiones?disco=${encodeURIComponent(ruta)}`);
        const data = await res.json();
        grid.innerHTML = "";
        data.particiones.forEach(p => {
            const montada = (p.id && p.id !== "SIN ID");
            const card = document.createElement("div");
            card.className = `visor-card part-card ${!montada ? 'disabled' : ''}`;
            card.innerHTML = `
                <div class="card-icon-wrap"><img src="imagenes/Particion.svg" class="card-icon"></div>
                <div class="card-name">${p.nombre}</div>
                <div class="card-tags"><span class="card-tag">${p.filesystem}</span></div>
                <div class="card-meta">ID: <span class="id-badge ${montada ? 'id-ok' : 'id-none'}">${montada ? p.id : 'NO MONTADA'}</span></div>
            `;
            card.onclick = () => {
                if (montada) {
                    estado.particionId = p.id;
                    document.getElementById("sessionParticion").textContent = p.id;
                    document.getElementById("sideArchivos").disabled = false;
                    document.getElementById("sideJournaling").disabled = (p.filesystem !== "EXT3");
                    navegarA("/");
                }
            };
            grid.appendChild(card);
        });
    } catch (e) { }
}

async function navegarA(path) {
    estado.pathFS = path;
    mostrarVista("archivos");
    document.getElementById("pathLabel").textContent = path;
    const lista = document.getElementById("listaArchivos");
    lista.innerHTML = '<div class="spinner"></div>';
    try {
        const res = await fetch(`${API}/archivos?id=${estado.particionId}&path=${encodeURIComponent(path)}`);
        const data = await res.json();
        lista.innerHTML = "";
        data.archivos.forEach(f => {
            const row = document.createElement("div");
            row.className = "file-row";
            const esDir = (f.tipo === "carpeta" || f.tipo === "1");
            row.innerHTML = `<span class="fr-icon"><img src="${esDir ? 'imagenes/Carpeta.svg' : 'imagenes/Archivo.svg'}" class="fr-img"></span><span class="fr-name">${f.nombre}</span><span class="fr-size">${esDir ? "—" : f.tamano+"B"}</span>`;
            row.onclick = () => esDir ? navegarA(path === "/" ? "/"+f.nombre : path+"/"+f.nombre) : alert("Detalles: "+f.nombre);
            lista.appendChild(row);
        });
    } catch (e) { lista.innerHTML = "Error al leer archivos."; }
}

// ── FUNCIÓN DE JOURNALING ──
async function cargarJournaling() {
    mostrarVista("journaling");
    const tbody = document.getElementById("journalBody");
    document.getElementById("journalSub").textContent = `ID Partición: ${estado.particionId}`;
    tbody.innerHTML = '<tr><td colspan="5" class="spinner"></td></tr>';

    try {
        const res = await fetch(`${API}/journaling?id=${estado.particionId}`);
        const data = await res.json();
        tbody.innerHTML = "";

        if (!data.entries || data.entries.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#666;">No hay transacciones registradas o la partición no es EXT3.</td></tr>';
            return;
        }

        data.entries.forEach((entry, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><span class="op-badge">${entry.operacion}</span></td>
                <td style="font-family:monospace; color:#50fa7b;">${entry.path}</td>
                <td style="color:#f1fa8c; font-size:0.8rem;">${entry.contenido}</td>
                <td style="color:#8be9fd;">${entry.fecha}</td>
            `;
            tbody.appendChild(tr);
        });
    } catch (e) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:#ff5555; text-align:center;">Error al cargar el journal. Verifique la conexión con el servidor.</td></tr>';
    }
}

function mostrarVista(vista) {
    document.querySelectorAll(".visor-view").forEach(v => v.classList.remove("active"));
    document.querySelectorAll(".sidebar-btn").forEach(b => b.classList.remove("active"));
    const idMap = { discos: "vistaDiscos", particiones: "vistaParticiones", archivos: "vistaArchivos", journaling: "vistaJournaling" };
    document.getElementById(idMap[vista]).classList.add("active");
    const btn = document.getElementById("side" + vista.charAt(0).toUpperCase() + vista.slice(1));
    if(btn) btn.classList.add("active");
}

function subirNivel() {
    if (estado.pathFS === "/") return;
    const p = estado.pathFS.split("/"); p.pop();
    navegarA(p.join("/") || "/");
}

function irHome() {
    document.getElementById("sideParticiones").disabled = true;
    document.getElementById("sideArchivos").disabled = true;
    document.getElementById("sideJournaling").disabled = true;
    mostrarVista("discos");
    cargarDiscos();
}
</script>
</body>
</html>
